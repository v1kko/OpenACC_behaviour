site_name: OpenACC Behaviour
site_url: https://v1kko.github.io/OpenACC_behaviour
site_author: Victor Azizi
repo_url: https://github.com/v1kko/OpenACC_behaviour
markdown_extensions:
  - codehilite
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

theme: 
  name: material
nav:
  - Introduction: index.md
  - 'Pointers in structs': pointers_structs.md
  - 'Characters in host routines' : characters.md
  - 'Module variable aliasing' : module_double_alloc.md
  - 'GPU-aware MPI probe' : gpu_aware_mpi.md
  - 'Using `acc_is_present` on a scalar' : acc_is_present_scalar.md
  - 'Using `exit data delete` on absent data' : exit_data_delete.md
  - 'Attaching and detaching pointers' : attach_detach.md
  - 'Reduction variables' : reduction_vars.md
